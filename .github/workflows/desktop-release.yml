name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform(s)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - windows
          - macos
          - linux
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  # ── Resolve the build matrix based on the selected platform ────
  # Tag pushes and "all" both build every target. Selecting a single
  # platform produces a one-entry matrix so only that runner spins up.
  matrix-setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          PLATFORM="${{ inputs.platform || 'all' }}"
          case "$PLATFORM" in
            windows)
              echo 'matrix={"include":[{"platform":"windows-latest","rust_target":"x86_64-pc-windows-msvc"}]}' >> "$GITHUB_OUTPUT"
              ;;
            macos)
              echo 'matrix={"include":[{"platform":"macos-latest","rust_target":"aarch64-apple-darwin"}]}' >> "$GITHUB_OUTPUT"
              ;;
            linux)
              echo 'matrix={"include":[{"platform":"ubuntu-22.04","rust_target":"x86_64-unknown-linux-gnu"}]}' >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo 'matrix={"include":[{"platform":"ubuntu-22.04","rust_target":"x86_64-unknown-linux-gnu"},{"platform":"windows-latest","rust_target":"x86_64-pc-windows-msvc"},{"platform":"macos-latest","rust_target":"aarch64-apple-darwin"}]}' >> "$GITHUB_OUTPUT"
              ;;
          esac

  # ── Determine the release tag (shared across all jobs) ─────────
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            VERSION=$(jq -r .version desktop/src-tauri/tauri.conf.json)
            SHORT_SHA=$(git rev-parse --short HEAD)
            TAG="desktop-v${VERSION}-dev.${SHORT_SHA}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

  # ── Build ──────────────────────────────────────────────────────
  build:
    needs: [matrix-setup, resolve-tag]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-setup.outputs.matrix) }}

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: desktop

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            desktop/package-lock.json
            extension/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
          cache-on-failure: true

      - name: Prepare extension (generates .wxt/tsconfig.json needed by shared components)
        run: npm ci
        working-directory: extension

      - name: Install frontend dependencies
        run: npm ci

      # tauri-action builds, signs updater artifacts, creates/updates
      # the GitHub release, and assembles latest.json across all platforms.
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: desktop
          tauriScript: npx tauri
          tagName: ${{ needs.resolve-tag.outputs.tag }}
          releaseName: "Scrollr ${{ needs.resolve-tag.outputs.tag }}"
          releaseBody: "See the [full changelog](https://github.com/brandon-relentnet/myscrollr/commits/${{ needs.resolve-tag.outputs.tag }}) for details."
          releaseDraft: false
          prerelease: false

      # ── Fix AppImage for rolling-release distros ───────────────
      # Bundled Ubuntu 22.04 libwayland-* are ABI-incompatible with
      # newer Mesa on Arch, Fedora, etc. We repackage without them,
      # then replace the release asset so direct downloads get the fix.
      - name: Fix AppImage for rolling-release distros
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name '*.AppImage' | head -1)
          if [ -n "$APPIMAGE" ]; then
            chmod +x "$APPIMAGE"
            "$APPIMAGE" --appimage-extract
            rm -f squashfs-root/usr/lib/libwayland-*.so.*
            wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
            chmod +x appimagetool-x86_64.AppImage
            ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run squashfs-root "$APPIMAGE"
            rm -rf squashfs-root appimagetool-x86_64.AppImage

            # Replace the release asset with the patched AppImage
            BASENAME=$(basename "$APPIMAGE")
            TAG="${{ needs.resolve-tag.outputs.tag }}"
            gh release upload "$TAG" "$APPIMAGE" --clobber --repo "$GITHUB_REPOSITORY"
          fi
