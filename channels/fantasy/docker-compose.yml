version: "3.8"

services:
  scrollr-fantasy-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: scrollr-fantasy-api
    # Bind only to localhost — the core gateway is the only trusted caller
    # and reaches us via the Docker network (CHANNEL_URL). Publishing on
    # 0.0.0.0 let anything else on the host bypass the gateway and hit
    # our routes directly (channels don't validate JWTs — they trust the
    # X-User-Sub header set by the gateway).
    ports:
      - "127.0.0.1:8084:8084"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - CHANNEL_URL=${CHANNEL_URL}
      - COOLIFY_FQDN=${COOLIFY_FQDN}
      - YAHOO_CLIENT_ID=${YAHOO_CLIENT_ID}
      - YAHOO_CLIENT_SECRET=${YAHOO_CLIENT_SECRET}
      - YAHOO_CALLBACK_URL=${YAHOO_CALLBACK_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - SYNC_ENABLED=${SYNC_ENABLED:-true}
      - SYNC_INTERVAL_SECS=${SYNC_INTERVAL_SECS:-120}
      - SYNC_CONCURRENCY=${SYNC_CONCURRENCY:-40}
    restart: unless-stopped
