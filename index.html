<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NCAAM Basketball Explorer — Debug Mode</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace; background: #0d1117; color: #c9d1d9; font-size: 13px; display: flex; flex-direction: column; height: 100vh; }

    /* ─── Header ─── */
    header { background: #161b22; border-bottom: 1px solid #30363d; padding: 8px 16px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; flex-shrink: 0; }
    header h1 { font-size: 14px; font-weight: 600; color: #58a6ff; white-space: nowrap; }
    .header-controls { display: flex; align-items: center; gap: 10px; }
    .header-controls label { font-size: 11px; color: #8b949e; }
    .header-controls select { padding: 3px 6px; border-radius: 3px; border: 1px solid #30363d; background: #0d1117; color: #c9d1d9; font-family: inherit; font-size: 12px; }
    #quota { margin-left: auto; font-size: 11px; color: #8b949e; white-space: nowrap; font-family: inherit; }
    #quota .warn { color: #d29922; }
    #quota .crit { color: #f85149; }
    .status-dots { display: flex; gap: 6px; align-items: center; margin-left: 12px; }
    .status-dot { display: flex; align-items: center; gap: 3px; font-size: 10px; color: #8b949e; }
    .dot { width: 7px; height: 7px; border-radius: 50%; }
    .dot-ok { background: #3fb950; }
    .dot-err { background: #f85149; }
    .dot-warn { background: #d29922; }

    /* ─── Error banner ─── */
    #error-banner { display: none; background: #f8514922; border-bottom: 1px solid #f85149; color: #f85149; padding: 6px 16px; font-size: 12px; flex-shrink: 0; }
    #error-banner.visible { display: flex; align-items: center; gap: 8px; }
    #error-banner .dismiss { background: none; border: none; color: #f85149; cursor: pointer; margin-left: auto; font-size: 14px; font-family: inherit; }

    /* ─── Tabs ─── */
    .tab-bar { display: flex; background: #161b22; border-bottom: 1px solid #30363d; overflow-x: auto; flex-shrink: 0; }
    .tab-bar button { background: none; border: none; color: #8b949e; padding: 8px 14px; font-size: 12px; cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: inherit; transition: color 0.15s; }
    .tab-bar button:hover { color: #c9d1d9; }
    .tab-bar button.active { color: #58a6ff; border-bottom-color: #58a6ff; }

    /* ─── Main split ─── */
    .main-split { display: flex; flex-direction: column; flex: 1; min-height: 0; }
    .content { padding: 12px 16px; overflow-y: auto; flex: 1; min-height: 0; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ─── Tables ─── */
    table { width: 100%; border-collapse: collapse; background: #161b22; border: 1px solid #30363d; border-radius: 4px; }
    th { background: #1c2128; text-align: left; padding: 6px 8px; font-size: 11px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0; border-bottom: 1px solid #30363d; }
    td { padding: 5px 8px; border-bottom: 1px solid #21262d; font-size: 12px; }
    tr:hover td { background: #1c2128; }
    tr.clickable { cursor: pointer; }
    tr.clickable:hover td { background: #1f6feb22; }
    td img { width: 18px; height: 18px; vertical-align: middle; margin-right: 4px; }

    /* ─── States ─── */
    .state-loading, .state-empty, .state-error { text-align: center; padding: 30px 16px; color: #8b949e; font-size: 13px; }
    .state-error { color: #f85149; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 6px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }



    .group-header { background: #1f6feb33; color: #58a6ff; padding: 6px 10px; font-size: 12px; font-weight: 600; margin-top: 12px; border-radius: 3px 3px 0 0; border: 1px solid #1f6feb55; border-bottom: none; }
    .group-header:first-child { margin-top: 0; }

    .badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 10px; font-weight: 600; }
    .badge-live { background: #f8514933; color: #f85149; border: 1px solid #f8514955; }
    .badge-finished { background: #3fb95033; color: #3fb950; border: 1px solid #3fb95055; }
    .badge-scheduled { background: #1f6feb33; color: #58a6ff; border: 1px solid #1f6feb55; }
    .badge-other { background: #8b949e33; color: #8b949e; border: 1px solid #8b949e55; }

    /* ═══════════════════════════════════════════════
       DEBUG PANEL
       ═══════════════════════════════════════════════ */
    .debug-resize { height: 4px; background: #30363d; cursor: ns-resize; flex-shrink: 0; position: relative; }
    .debug-resize:hover, .debug-resize.dragging { background: #58a6ff; }

    .debug-panel { background: #0d1117; border-top: 1px solid #30363d; display: flex; flex-direction: column; flex-shrink: 0; height: 280px; min-height: 80px; }

    .debug-toolbar { display: flex; align-items: center; gap: 8px; padding: 4px 12px; background: #161b22; border-bottom: 1px solid #30363d; flex-shrink: 0; }
    .debug-toolbar .title { font-size: 11px; font-weight: 700; color: #58a6ff; text-transform: uppercase; letter-spacing: 0.5px; }
    .debug-toolbar button { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 2px 8px; border-radius: 3px; cursor: pointer; font-size: 10px; font-family: inherit; }
    .debug-toolbar button:hover { background: #30363d; }
    .debug-toolbar button.active { background: #1f6feb33; color: #58a6ff; border-color: #1f6feb; }
    .debug-stats { margin-left: auto; display: flex; gap: 12px; font-size: 10px; color: #8b949e; }
    .debug-stats span { display: flex; align-items: center; gap: 3px; }

    .debug-filter-bar { display: flex; gap: 6px; padding: 4px 12px; background: #0d1117; border-bottom: 1px solid #21262d; flex-shrink: 0; }
    .debug-filter-bar input { flex: 1; background: #161b22; border: 1px solid #30363d; color: #c9d1d9; padding: 3px 8px; border-radius: 3px; font-family: inherit; font-size: 11px; }
    .debug-filter-bar input::placeholder { color: #484f58; }

    .debug-log { flex: 1; overflow-y: auto; padding: 0; font-size: 12px; }
    .debug-log::-webkit-scrollbar { width: 6px; }
    .debug-log::-webkit-scrollbar-track { background: #0d1117; }
    .debug-log::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

    .log-entry { border-bottom: 1px solid #21262d; padding: 0; font-family: inherit; }
    .log-summary { display: flex; align-items: center; gap: 8px; padding: 4px 12px; cursor: pointer; }
    .log-summary:hover { background: #161b22; }
    .log-time { color: #484f58; font-size: 10px; min-width: 75px; flex-shrink: 0; }
    .log-level { font-size: 10px; font-weight: 700; min-width: 40px; text-transform: uppercase; flex-shrink: 0; }
    .log-level.req { color: #58a6ff; }
    .log-level.res-ok { color: #3fb950; }
    .log-level.res-err { color: #f85149; }
    .log-level.warn { color: #d29922; }
    .log-level.info { color: #8b949e; }
    .log-level.error { color: #f85149; }
    .log-method { color: #d2a8ff; font-weight: 600; min-width: 30px; flex-shrink: 0; }
    .log-url { color: #c9d1d9; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .log-status { font-weight: 700; min-width: 28px; text-align: right; flex-shrink: 0; }
    .log-status.s2xx { color: #3fb950; }
    .log-status.s4xx { color: #d29922; }
    .log-status.s5xx { color: #f85149; }
    .log-timing { color: #8b949e; font-size: 10px; min-width: 50px; text-align: right; flex-shrink: 0; }
    .log-size { color: #484f58; font-size: 10px; min-width: 55px; text-align: right; flex-shrink: 0; }
    .log-results { color: #8b949e; font-size: 10px; min-width: 45px; text-align: right; flex-shrink: 0; }
    .log-toggle { color: #484f58; font-size: 10px; flex-shrink: 0; transition: transform 0.15s; }
    .log-entry.expanded .log-toggle { transform: rotate(90deg); }
    .log-detail { display: none; padding: 0 12px 8px 12px; }
    .log-entry.expanded .log-detail { display: block; }
    .log-detail-section { margin-top: 6px; }
    .log-detail-section h4 { font-size: 10px; color: #58a6ff; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
    .log-detail pre { background: #161b22; border: 1px solid #21262d; border-radius: 3px; padding: 6px 8px; font-size: 11px; color: #c9d1d9; overflow-x: auto; max-height: 300px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
    .log-detail .kv-table { width: 100%; border-collapse: collapse; }
    .log-detail .kv-table td { padding: 2px 6px; font-size: 11px; border-bottom: 1px solid #21262d; }
    .log-detail .kv-table td:first-child { color: #d2a8ff; width: 180px; white-space: nowrap; }
    .log-detail .kv-table td:last-child { color: #c9d1d9; word-break: break-all; }

    /* Generic log (console capture, info) */
    .log-msg { color: #c9d1d9; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .log-msg.error-msg { color: #f85149; }
    .log-msg.warn-msg { color: #d29922; }

    /* ─── JSON syntax highlighting ─── */
    .json-key { color: #7ee787; }
    .json-str { color: #a5d6ff; }
    .json-num { color: #d2a8ff; }
    .json-bool { color: #ff7b72; }
    .json-null { color: #8b949e; }
  </style>
</head>
<body>

  <header>
    <h1>NCAAM Basketball Explorer</h1>
    <div class="header-controls">
      <label for="season-select">Season:</label>
      <select id="season-select" disabled><option>Loading...</option></select>
    </div>
    <div class="status-dots">
      <span class="status-dot"><span class="dot dot-ok" id="dot-api"></span> API</span>
      <span class="status-dot"><span class="dot dot-ok" id="dot-league"></span> League</span>
    </div>
    <div id="quota">Quota: --</div>
  </header>

  <div id="error-banner"><span id="error-text"></span><button class="dismiss" onclick="hideError()">&times;</button></div>

  <nav class="tab-bar">
    <button class="active" data-tab="teams">Teams</button>
    <button data-tab="games">Games</button>
    <button data-tab="standings">Standings</button>
    <button data-tab="players">Players</button>

  </nav>

  <div class="main-split">
    <div class="content">
      <div id="tab-teams" class="tab-content active">
        <div id="teams-list"></div>
      </div>
      <div id="tab-games" class="tab-content">
        <div id="games-list"></div>
      </div>
      <div id="tab-standings" class="tab-content">
        <div id="standings-content"></div>
      </div>
      <div id="tab-players" class="tab-content">
        <div id="players-team-selector" style="margin-bottom:10px;"></div>
        <div id="players-content"><div class="state-empty">Select a team to view its players. (Basketball API requires a team filter.)</div></div>
      </div>

    </div>

    <!-- ═══ DEBUG PANEL ═══ -->
    <div class="debug-resize" id="debug-resize"></div>
    <div class="debug-panel" id="debug-panel">
      <div class="debug-toolbar">
        <span class="title">Debug Console</span>
        <button id="filter-all" class="active" onclick="setLogFilter('all')">All</button>
        <button id="filter-req" onclick="setLogFilter('req')">Requests</button>
        <button id="filter-err" onclick="setLogFilter('err')">Errors</button>
        <button id="filter-info" onclick="setLogFilter('info')">Info</button>
        <button onclick="clearDebugLog()">Clear</button>
        <button onclick="copyDebugLog()">Copy All</button>
        <button id="autoscroll-btn" class="active" onclick="toggleAutoscroll()">Autoscroll</button>
        <div class="debug-stats">
          <span><span class="dot dot-ok" style="width:5px;height:5px;display:inline-block;"></span> <span id="stat-ok">0</span> ok</span>
          <span><span class="dot dot-err" style="width:5px;height:5px;display:inline-block;"></span> <span id="stat-err">0</span> err</span>
          <span>avg <span id="stat-avg">0</span>ms</span>
          <span>total <span id="stat-total">0</span></span>
        </div>
      </div>
      <div class="debug-filter-bar">
        <input type="text" id="debug-search" placeholder="Filter logs... (url, status, message)" oninput="applyLogFilter()">
      </div>
      <div class="debug-log" id="debug-log"></div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════
    // CONFIG
    // ═══════════════════════════════════════════════
    const API_KEY = '2c3e33d7cc8be90d52115610b32be5e2'
    const BASE_URL = 'https://v1.basketball.api-sports.io'

    // ═══════════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════════
    let leagueId = null
    let currentSeason = null
    let cachedTeams = []
    let tabDataLoaded = {}

    // Debug state
    let logEntries = []
    let logIdCounter = 0
    let logFilter = 'all'
    let autoscroll = true
    let statsOk = 0
    let statsErr = 0
    let statsTotalTime = 0
    let statsTotalReqs = 0

    // ═══════════════════════════════════════════════
    // DEBUG LOGGING ENGINE
    // ═══════════════════════════════════════════════
    function debugLog(entry) {
      entry.id = ++logIdCounter
      entry.timestamp = new Date()
      logEntries.push(entry)
      renderLogEntry(entry)
      updateDebugStats()
    }

    function logRequest(method, url, params) {
      debugLog({
        type: 'req',
        method,
        url: url.toString(),
        params: { ...params },
      })
    }

    function logResponse(method, url, status, timing, headers, body, bodySize) {
      const isOk = status >= 200 && status < 300
      const hasApiError = body?.errors && Object.keys(body.errors).length > 0
      const resultCount = body?.results ?? null

      if (isOk && !hasApiError) statsOk++
      else statsErr++
      statsTotalTime += timing
      statsTotalReqs++

      debugLog({
        type: 'res',
        method,
        url: url.toString(),
        status,
        timing,
        headers: Object.fromEntries(headers.entries()),
        body,
        bodySize,
        resultCount,
        isOk: isOk && !hasApiError,
        hasApiError,
      })
    }

    function logError(message, detail) {
      statsErr++
      debugLog({ type: 'error', message, detail })
    }

    function logWarn(message, detail) {
      debugLog({ type: 'warn', message, detail })
    }

    function logInfo(message, detail) {
      debugLog({ type: 'info', message, detail })
    }

    // ═══════════════════════════════════════════════
    // DEBUG PANEL RENDERING
    // ═══════════════════════════════════════════════
    function renderLogEntry(entry) {
      const container = document.getElementById('debug-log')
      const el = document.createElement('div')
      el.className = 'log-entry'
      el.dataset.type = entry.type
      el.dataset.id = entry.id
      el.dataset.searchable = buildSearchable(entry).toLowerCase()

      const timeStr = entry.timestamp.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit', fractionalSecondDigits: 3 })

      if (entry.type === 'req') {
        el.innerHTML = `
          <div class="log-summary" onclick="toggleLogDetail(${entry.id})">
            <span class="log-toggle">&#9654;</span>
            <span class="log-time">${timeStr}</span>
            <span class="log-level req">REQ</span>
            <span class="log-method">${esc(entry.method)}</span>
            <span class="log-url">${esc(entry.url)}</span>
          </div>
          <div class="log-detail">
            <div class="log-detail-section">
              <h4>Request URL</h4>
              <pre>${esc(entry.url)}</pre>
            </div>
            ${Object.keys(entry.params).length > 0 ? `
            <div class="log-detail-section">
              <h4>Parameters</h4>
              <pre>${syntaxHighlight(entry.params)}</pre>
            </div>` : ''}
          </div>`
      } else if (entry.type === 'res') {
        const statusClass = entry.status < 300 ? 's2xx' : entry.status < 500 ? 's4xx' : 's5xx'
        const levelClass = entry.isOk ? 'res-ok' : 'res-err'
        const timingColor = entry.timing < 300 ? '#3fb950' : entry.timing < 1000 ? '#d29922' : '#f85149'
        el.innerHTML = `
          <div class="log-summary" onclick="toggleLogDetail(${entry.id})">
            <span class="log-toggle">&#9654;</span>
            <span class="log-time">${timeStr}</span>
            <span class="log-level ${levelClass}">${entry.isOk ? 'OK' : 'ERR'}</span>
            <span class="log-method">${esc(entry.method)}</span>
            <span class="log-url">${esc(entry.url)}</span>
            <span class="log-results">${entry.resultCount !== null ? entry.resultCount + ' res' : ''}</span>
            <span class="log-status ${statusClass}">${entry.status}</span>
            <span class="log-timing" style="color:${timingColor}">${entry.timing}ms</span>
            <span class="log-size">${formatBytes(entry.bodySize)}</span>
          </div>
          <div class="log-detail">
            <div class="log-detail-section">
              <h4>Response Headers</h4>
              <table class="kv-table">${Object.entries(entry.headers).map(([k,v]) => `<tr><td>${esc(k)}</td><td>${esc(v)}</td></tr>`).join('')}</table>
            </div>
            <div class="log-detail-section">
              <h4>Response Body (${formatBytes(entry.bodySize)}${entry.resultCount !== null ? `, ${entry.resultCount} results` : ''})</h4>
              <pre>${syntaxHighlight(entry.body)}</pre>
            </div>
            ${entry.hasApiError ? `<div class="log-detail-section"><h4 style="color:#f85149">API Errors</h4><pre style="border-color:#f85149">${syntaxHighlight(entry.body?.errors)}</pre></div>` : ''}
          </div>`
      } else {
        // info, warn, error
        const levelClass = entry.type
        const msgClass = entry.type === 'error' ? 'error-msg' : entry.type === 'warn' ? 'warn-msg' : ''
        el.innerHTML = `
          <div class="log-summary" onclick="toggleLogDetail(${entry.id})">
            <span class="log-toggle">&#9654;</span>
            <span class="log-time">${timeStr}</span>
            <span class="log-level ${levelClass}">${entry.type.toUpperCase()}</span>
            <span class="log-msg ${msgClass}">${esc(entry.message)}</span>
          </div>
          <div class="log-detail">
            ${entry.detail ? `<div class="log-detail-section"><pre>${typeof entry.detail === 'object' ? syntaxHighlight(entry.detail) : esc(String(entry.detail))}</pre></div>` : '<div class="log-detail-section" style="color:#484f58;padding:4px 0;">No additional detail.</div>'}
          </div>`
      }

      // Apply current filter
      if (!matchesFilter(el)) el.style.display = 'none'

      container.appendChild(el)
      if (autoscroll) container.scrollTop = container.scrollHeight
    }

    function toggleLogDetail(id) {
      const el = document.querySelector(`.log-entry[data-id="${id}"]`)
      if (el) el.classList.toggle('expanded')
    }

    function buildSearchable(entry) {
      let s = entry.type + ' '
      if (entry.url) s += entry.url + ' '
      if (entry.status) s += entry.status + ' '
      if (entry.message) s += entry.message + ' '
      if (entry.resultCount !== null && entry.resultCount !== undefined) s += entry.resultCount + ' results '
      return s
    }

    function matchesFilter(el) {
      const type = el.dataset.type
      const search = document.getElementById('debug-search').value.toLowerCase()
      const searchable = el.dataset.searchable || ''

      // Type filter
      if (logFilter === 'req' && type !== 'req' && type !== 'res') return false
      if (logFilter === 'err' && type !== 'error' && !(type === 'res' && el.querySelector('.res-err'))) return false
      if (logFilter === 'info' && type !== 'info' && type !== 'warn') return false

      // Text filter
      if (search && !searchable.includes(search)) return false

      return true
    }

    function applyLogFilter() {
      document.querySelectorAll('.log-entry').forEach(el => {
        el.style.display = matchesFilter(el) ? '' : 'none'
      })
    }

    function setLogFilter(filter) {
      logFilter = filter
      document.querySelectorAll('.debug-toolbar button').forEach(b => {
        if (b.id && b.id.startsWith('filter-')) b.classList.remove('active')
      })
      const btn = document.getElementById('filter-' + filter)
      if (btn) btn.classList.add('active')
      applyLogFilter()
    }

    function clearDebugLog() {
      logEntries = []
      document.getElementById('debug-log').innerHTML = ''
      statsOk = 0; statsErr = 0; statsTotalTime = 0; statsTotalReqs = 0
      updateDebugStats()
      logInfo('Debug log cleared')
    }

    function copyDebugLog() {
      const lines = logEntries.map(e => {
        const t = e.timestamp.toISOString()
        if (e.type === 'req') return `[${t}] REQ ${e.method} ${e.url}`
        if (e.type === 'res') return `[${t}] ${e.isOk ? 'OK' : 'ERR'} ${e.status} ${e.url} ${e.timing}ms ${e.resultCount ?? ''} results`
        return `[${t}] ${e.type.toUpperCase()} ${e.message}`
      })
      navigator.clipboard.writeText(lines.join('\n')).then(() => logInfo('Log copied to clipboard'))
    }

    function toggleAutoscroll() {
      autoscroll = !autoscroll
      document.getElementById('autoscroll-btn').classList.toggle('active', autoscroll)
    }

    function updateDebugStats() {
      document.getElementById('stat-ok').textContent = statsOk
      document.getElementById('stat-err').textContent = statsErr
      document.getElementById('stat-avg').textContent = statsTotalReqs > 0 ? Math.round(statsTotalTime / statsTotalReqs) : 0
      document.getElementById('stat-total').textContent = statsTotalReqs
    }

    // ═══════════════════════════════════════════════
    // JSON SYNTAX HIGHLIGHTING
    // ═══════════════════════════════════════════════
    function syntaxHighlight(obj) {
      if (obj === undefined || obj === null) return '<span class="json-null">null</span>'
      const json = JSON.stringify(obj, null, 2)
      return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, (match) => {
        let cls = 'json-num'
        if (/^"/.test(match)) {
          cls = /:$/.test(match) ? 'json-key' : 'json-str'
        } else if (/true|false/.test(match)) {
          cls = 'json-bool'
        } else if (/null/.test(match)) {
          cls = 'json-null'
        }
        return `<span class="${cls}">${match}</span>`
      })
    }

    function formatBytes(bytes) {
      if (bytes === undefined || bytes === null) return '—'
      if (bytes < 1024) return bytes + ' B'
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB'
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB'
    }

    // ═══════════════════════════════════════════════
    // RESIZE HANDLE
    // ═══════════════════════════════════════════════
    ;(function initResize() {
      const handle = document.getElementById('debug-resize')
      const panel = document.getElementById('debug-panel')
      let startY, startH

      handle.addEventListener('mousedown', (e) => {
        startY = e.clientY
        startH = panel.offsetHeight
        handle.classList.add('dragging')
        document.addEventListener('mousemove', onDrag)
        document.addEventListener('mouseup', onStop)
        e.preventDefault()
      })

      function onDrag(e) {
        const delta = startY - e.clientY
        panel.style.height = Math.max(80, startH + delta) + 'px'
      }
      function onStop() {
        handle.classList.remove('dragging')
        document.removeEventListener('mousemove', onDrag)
        document.removeEventListener('mouseup', onStop)
      }
    })()

    // ═══════════════════════════════════════════════
    // CONSOLE CAPTURE
    // ═══════════════════════════════════════════════
    const _origConsole = { log: console.log, warn: console.warn, error: console.error }
    console.log = (...args) => { _origConsole.log(...args); logInfo(args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ')) }
    console.warn = (...args) => { _origConsole.warn(...args); logWarn(args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ')) }
    console.error = (...args) => { _origConsole.error(...args); logError(args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ')) }
    window.addEventListener('error', (e) => { logError(`Uncaught: ${e.message}`, { file: e.filename, line: e.lineno, col: e.colno }) })
    window.addEventListener('unhandledrejection', (e) => { logError(`Unhandled rejection: ${e.reason}`) })

    // ═══════════════════════════════════════════════
    // API WRAPPER (INSTRUMENTED)
    // ═══════════════════════════════════════════════
    async function apiFetch(endpoint, params = {}) {
      const url = new URL(BASE_URL + endpoint)
      Object.entries(params).forEach(([k, v]) => {
        if (v !== undefined && v !== null) url.searchParams.set(k, v)
      })

      logRequest('GET', url, params)
      const t0 = performance.now()

      try {
        const res = await fetch(url.toString(), {
          headers: { 'x-apisports-key': API_KEY }
        })

        const bodyText = await res.text()
        const timing = Math.round(performance.now() - t0)
        let data
        try { data = JSON.parse(bodyText) } catch { data = bodyText }

        logResponse('GET', url, res.status, timing, res.headers, data, bodyText.length)

        // Update quota
        const remaining = res.headers.get('x-ratelimit-requests-remaining')
        const limit = res.headers.get('x-ratelimit-requests-limit')
        if (remaining !== null && limit !== null) {
          const pct = (Number(remaining) / Number(limit)) * 100
          const cls = pct < 10 ? 'crit' : pct < 30 ? 'warn' : ''
          document.getElementById('quota').innerHTML = `Quota: <span class="${cls}">${remaining}</span> / ${limit}`
          if (pct < 10) logWarn(`Quota critically low: ${remaining}/${limit} (${pct.toFixed(1)}%)`)
        }

        if (res.status === 429) {
          showError('Rate limit exceeded (429). Wait before retrying.')
          setDot('dot-api', 'dot-err')
          return null
        }
        if (!res.ok) {
          showError(`HTTP ${res.status}: ${res.statusText}`)
          setDot('dot-api', 'dot-err')
          return null
        }

        if (data?.errors && typeof data.errors === 'object' && Object.keys(data.errors).length > 0) {
          const errMsg = Object.values(data.errors).join(', ')
          showError(`API Error: ${errMsg}`)
          return null
        }

        setDot('dot-api', 'dot-ok')
        hideError()
        return data
      } catch (err) {
        const timing = Math.round(performance.now() - t0)
        logError(`Network error: ${err.message}`, { endpoint, params, stack: err.stack })
        showError(`Network error: ${err.message}`)
        setDot('dot-api', 'dot-err')
        return null
      }
    }

    // ═══════════════════════════════════════════════
    // UI HELPERS
    // ═══════════════════════════════════════════════
    function showError(msg) {
      document.getElementById('error-text').textContent = msg
      document.getElementById('error-banner').classList.add('visible')
    }
    function hideError() {
      document.getElementById('error-banner').classList.remove('visible')
    }
    function setDot(id, cls) {
      const el = document.getElementById(id)
      el.className = 'dot ' + cls
    }
    function loading() { return '<div class="state-loading"><span class="spinner"></span> Loading...</div>' }
    function empty(msg = 'No data available.') { return `<div class="state-empty">${msg}</div>` }
    function errorState(msg = 'Failed to load data.') { return `<div class="state-error">${msg}</div>` }
    function esc(str) {
      if (str === null || str === undefined) return '—'
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    }
    function gameStatusBadge(status) {
      if (!status) return '<span class="badge badge-other">—</span>'
      const s = String(status.short || status).toUpperCase()
      if (['Q1','Q2','Q3','Q4','OT','BT','HT'].includes(s)) return `<span class="badge badge-live">${esc(status.long || s)}</span>`
      if (['FT','AOT','AP'].includes(s)) return `<span class="badge badge-finished">${esc(status.long || s)}</span>`
      if (s === 'NS') return `<span class="badge badge-scheduled">${esc(status.long || 'Scheduled')}</span>`
      return `<span class="badge badge-other">${esc(status.long || s)}</span>`
    }

    // ═══════════════════════════════════════════════
    // TAB SWITCHING
    // ═══════════════════════════════════════════════
    document.querySelectorAll('.tab-bar button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'))
        btn.classList.add('active')
        document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'))
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active')
        logInfo(`Tab switched: ${btn.dataset.tab}`)
        loadTabData(btn.dataset.tab)
      })
    })

    function loadTabData(tab) {
      const key = tab + '-' + currentSeason
      if (tabDataLoaded[key]) { logInfo(`Tab "${tab}" already loaded for season ${currentSeason}, using cache`); return }
      tabDataLoaded[key] = true

      switch (tab) {
        case 'teams': loadTeams(); break
        case 'games': loadGames(); break
        case 'standings': loadStandings(); break
        case 'players': loadPlayersSelector(); break
      }
    }

    document.getElementById('season-select').addEventListener('change', (e) => {
      currentSeason = e.target.value
      tabDataLoaded = {}
      cachedTeams = []
      logInfo(`Season changed to ${currentSeason}`)
      const activeTab = document.querySelector('.tab-bar button.active').dataset.tab
      loadTabData(activeTab)
    })

    // ═══════════════════════════════════════════════
    // BOOTSTRAP
    // ═══════════════════════════════════════════════
    async function bootstrap() {
      logInfo('Bootstrap started — searching for NCAAM league...')
      setDot('dot-league', 'dot-warn')

      const data = await apiFetch('/leagues', { search: 'NCAA' })
      if (!data) {
        showError('Failed to load leagues. Check API key and network.')
        setDot('dot-league', 'dot-err')
        return
      }

      logInfo(`Found ${data.response.length} league(s) matching "NCAA"`, data.response.map(l => ({ id: l.id, name: l.name, country: l.country })))

      let league = data.response.find(l => l.name && /ncaa/i.test(l.name) && /men/i.test(l.name) && !/women/i.test(l.name))
      if (!league) league = data.response.find(l => l.name && /ncaa/i.test(l.name) && !/women/i.test(l.name))
      if (!league) league = data.response.find(l => l.name && /ncaa/i.test(l.name))
      if (!league && data.response.length > 0) league = data.response[0]

      if (!league) {
        showError('Could not find NCAAM league.')
        setDot('dot-league', 'dot-err')
        logError('NCAAM league not found in response', data.response)
        return
      }

      leagueId = league.id
      logInfo(`Using league: "${league.name}" (ID: ${leagueId})`)
      setDot('dot-league', 'dot-ok')
      document.querySelector('header h1').textContent = `${league.name || 'NCAAM'} Basketball Explorer`

      // Seasons
      logInfo('Loading seasons...')
      const seasonsData = await apiFetch('/leagues', { id: leagueId })
      let seasons = []
      if (seasonsData?.response?.length > 0) {
        const info = seasonsData.response[0]
        if (info.seasons && Array.isArray(info.seasons)) {
          seasons = info.seasons.map(s => s.season).sort((a, b) => b - a)
        }
      }

      if (seasons.length === 0) {
        logWarn('No seasons from /leagues, trying /seasons fallback...')
        const fallback = await apiFetch('/seasons')
        if (fallback?.response) seasons = fallback.response.sort((a, b) => b - a)
      }

      logInfo(`Available seasons: ${seasons.join(', ') || 'none'}`)

      const sel = document.getElementById('season-select')
      sel.innerHTML = ''
      if (seasons.length === 0) {
        sel.innerHTML = '<option>No seasons</option>'
        logWarn('No seasons available for this league')
        return
      }

      seasons.forEach(s => {
        const opt = document.createElement('option')
        opt.value = s
        opt.textContent = s  // Already "2023-2024" format from API
        sel.appendChild(opt)
      })
      sel.disabled = false
      currentSeason = seasons[0]
      logInfo(`Selected season: ${currentSeason}`)

      loadTabData('teams')
    }

    // ═══════════════════════════════════════════════
    // TEAMS
    // ═══════════════════════════════════════════════
    async function loadTeams() {
      const container = document.getElementById('teams-list')
      container.innerHTML = loading()

      const data = await apiFetch('/teams', { league: leagueId, season: currentSeason })
      if (!data) { container.innerHTML = errorState(); return }
      if (data.response.length === 0) { container.innerHTML = empty('No teams found.'); return }

      cachedTeams = data.response
      logInfo(`Loaded ${data.response.length} teams`)

      let html = '<table><thead><tr><th></th><th>Team</th><th>Country</th><th>ID</th></tr></thead><tbody>'
      data.response.forEach(t => {
        const logo = t.logo ? `<img src="${esc(t.logo)}" alt="" onerror="this.style.display='none'">` : ''
        html += `<tr>`
        html += `<td>${logo}</td><td>${esc(t.name)}</td>`
        html += `<td>${esc(t.country?.name || '—')}</td><td>${esc(t.id)}</td></tr>`
      })
      html += '</tbody></table>'
      container.innerHTML = html
    }

    // ═══════════════════════════════════════════════
    // GAMES
    // ═══════════════════════════════════════════════
    async function loadGames() {
      const container = document.getElementById('games-list')
      container.innerHTML = loading()

      const data = await apiFetch('/games', { league: leagueId, season: currentSeason })
      if (!data) { container.innerHTML = errorState(); return }
      if (data.response.length === 0) { container.innerHTML = empty('No games found.'); return }

      logInfo(`Loaded ${data.response.length} games`)

      let html = '<table><thead><tr><th>Date</th><th>Home</th><th>Score</th><th>Away</th><th>Status</th></tr></thead><tbody>'
      data.response.forEach(g => {
        const date = g.date ? new Date(g.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '—'
        const home = g.teams?.home?.name || '—'
        const away = g.teams?.away?.name || '—'
        const score = `${g.scores?.home?.total ?? '—'} - ${g.scores?.away?.total ?? '—'}`

        html += `<tr>`
        html += `<td>${esc(date)}</td><td>${esc(home)}</td><td><strong>${esc(score)}</strong></td>`
        html += `<td>${esc(away)}</td><td>${gameStatusBadge(g.status || {})}</td></tr>`
      })
      html += '</tbody></table>'
      container.innerHTML = html
    }



    // ═══════════════════════════════════════════════
    // STANDINGS
    // ═══════════════════════════════════════════════
    async function loadStandings() {
      const container = document.getElementById('standings-content')
      container.innerHTML = loading()

      const data = await apiFetch('/standings', { league: leagueId, season: currentSeason })
      if (!data) { container.innerHTML = errorState(); return }
      if (data.response.length === 0) { container.innerHTML = empty('No standings data.'); return }

      // Response is [[...teams]] — flatten and group by .group.name
      let allTeams = []
      data.response.forEach(group => {
        if (Array.isArray(group)) allTeams = allTeams.concat(group)
        else allTeams.push(group)
      })

      logInfo(`Loaded standings: ${allTeams.length} teams`)

      // Group by conference/group name
      const groups = {}
      allTeams.forEach(s => {
        const gName = s.group?.name || 'Overall'
        if (!groups[gName]) groups[gName] = []
        groups[gName].push(s)
      })

      let html = ''
      Object.entries(groups).forEach(([groupName, items]) => {
        html += `<div class="group-header">${esc(groupName)} (${items.length})</div>`
        html += '<table><thead><tr><th>#</th><th>Team</th><th>GP</th><th>W</th><th>L</th><th>Win%</th><th>PF</th><th>PA</th></tr></thead><tbody>'
        items.forEach(s => {
          const team = s.team || {}
          const logo = team.logo ? `<img src="${esc(team.logo)}" alt="" onerror="this.style.display='none'">` : ''
          const winPct = s.games?.win?.percentage || '—'
          html += `<tr><td>${esc(s.position)}</td><td>${logo}${esc(team.name)}</td>`
          html += `<td>${esc(s.games?.played ?? '—')}</td>`
          html += `<td>${esc(s.games?.win?.total ?? '—')}</td>`
          html += `<td>${esc(s.games?.lose?.total ?? '—')}</td>`
          html += `<td>${esc(winPct)}</td>`
          html += `<td>${esc(s.points?.for ?? '—')}</td>`
          html += `<td>${esc(s.points?.against ?? '—')}</td></tr>`
        })
        html += '</tbody></table>'
      })
      container.innerHTML = html || empty()
    }

    // ═══════════════════════════════════════════════
    // PLAYERS (requires team param)
    // ═══════════════════════════════════════════════
    function loadPlayersSelector() {
      const container = document.getElementById('players-team-selector')
      const teams = cachedTeams.length > 0 ? cachedTeams : []
      if (teams.length === 0) {
        // Need to fetch teams first
        apiFetch('/teams', { league: leagueId, season: currentSeason }).then(data => {
          if (data?.response?.length > 0) {
            cachedTeams = data.response
            renderPlayersTeamSelector(data.response)
          }
        })
        return
      }
      renderPlayersTeamSelector(teams)
    }

    function renderPlayersTeamSelector(teams) {
      const container = document.getElementById('players-team-selector')
      let html = '<label style="color:#8b949e;font-size:11px;">Select team: </label>'
      html += '<select style="background:#161b22;border:1px solid #30363d;color:#c9d1d9;padding:3px 6px;border-radius:3px;font-family:inherit;font-size:12px;" onchange="loadPlayersForTeam(this.value)">'
      html += '<option value="">-- Choose a team --</option>'
      teams.forEach(t => { html += `<option value="${t.id}">${esc(t.name)}</option>` })
      html += '</select>'
      container.innerHTML = html
    }

    async function loadPlayersForTeam(teamId) {
      if (!teamId) return
      const container = document.getElementById('players-content')
      container.innerHTML = loading()

      const team = cachedTeams.find(t => t.id == teamId)
      logInfo(`Loading players for team "${team?.name || teamId}"`)

      const data = await apiFetch('/players', { team: teamId, season: currentSeason })
      if (!data) { container.innerHTML = errorState(); return }
      if (data.response.length === 0) { container.innerHTML = empty('No players found for this team.'); return }

      logInfo(`Loaded ${data.response.length} players for ${team?.name || teamId}`)

      let html = '<table><thead><tr><th>Name</th><th>Number</th><th>Position</th><th>Age</th><th>Country</th></tr></thead><tbody>'
      data.response.forEach(p => {
        html += `<tr><td>${esc(p.name)}</td>`
        html += `<td>${esc(p.number || '—')}</td>`
        html += `<td>${esc(p.position || '—')}</td>`
        html += `<td>${esc(p.age || '—')}</td>`
        html += `<td>${esc(p.country || '—')}</td></tr>`
      })
      html += '</tbody></table>'
      container.innerHTML = html
    }



    // ═══════════════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════════════
    logInfo('NCAAM Basketball Explorer initialized')
    logInfo(`API base: ${BASE_URL}`)
    logInfo(`API key: ${API_KEY.slice(0, 6)}...${API_KEY.slice(-4)}`)
    bootstrap()
  </script>
</body>
</html>
