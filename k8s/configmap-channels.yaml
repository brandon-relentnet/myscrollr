apiVersion: v1
kind: ConfigMap
metadata:
  name: channels-config
  namespace: scrollr
data:
  # Shared across all channel APIs
  ALLOWED_ORIGINS: "https://myscrollr.com,https://api.myscrollr.com"
  FRONTEND_URL: "https://myscrollr.com"

  # Channel API self-registration URLs (K8s Service DNS)
  FINANCE_CHANNEL_URL: "http://finance-api:8081"
  SPORTS_CHANNEL_URL: "http://sports-api:8082"
  RSS_CHANNEL_URL: "http://rss-api:8083"
  FANTASY_CHANNEL_URL: "http://fantasy-api:8084"

  # Go API -> Rust service internal URLs (K8s Service DNS)
  INTERNAL_FINANCE_URL: "http://finance-service:3001"
  INTERNAL_SPORTS_URL: "http://sports-service:3002"
  INTERNAL_RSS_URL: "http://rss-service:3004"

  # Fantasy-specific
  YAHOO_CALLBACK_URL: "https://api.myscrollr.com/yahoo/callback"
  SYNC_ENABLED: "true"
  SYNC_INTERVAL_SECS: "120"
  SYNC_CONCURRENCY: "40"
