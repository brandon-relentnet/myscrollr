apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-api
  namespace: scrollr
  labels:
    app: core-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: core-api
  template:
    metadata:
      labels:
        app: core-api
    spec:
      containers:
        - name: core-api
          image: registry.digitalocean.com/scrollr/core-api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: core-config
            - secretRef:
                name: scrollr-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # Core /health now returns 503 when any dependency is
          # degraded (see PR #108 server.go changes). Add a startupProbe
          # so a slow Postgres connection doesn't get misread as
          # liveness failure during deploy.
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 30
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 6
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
---
apiVersion: v1
kind: Service
metadata:
  name: core-api
  namespace: scrollr
spec:
  selector:
    app: core-api
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
