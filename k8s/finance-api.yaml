apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-api
  namespace: scrollr
  labels:
    app: finance-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finance-api
  template:
    metadata:
      labels:
        app: finance-api
    spec:
      containers:
        - name: finance-api
          image: registry.digitalocean.com/scrollr/finance-api:latest
          ports:
            - containerPort: 8081
          env:
            - name: CHANNEL_URL
              valueFrom:
                configMapKeyRef:
                  name: channels-config
                  key: FINANCE_CHANNEL_URL
            - name: INTERNAL_FINANCE_URL
              valueFrom:
                configMapKeyRef:
                  name: channels-config
                  key: INTERNAL_FINANCE_URL
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: channels-config
                  key: ALLOWED_ORIGINS
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: scrollr-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: scrollr-secrets
                  key: REDIS_URL
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: scrollr-secrets
                  key: ENCRYPTION_KEY
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /internal/health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /internal/health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: finance-api
  namespace: scrollr
spec:
  selector:
    app: finance-api
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP
