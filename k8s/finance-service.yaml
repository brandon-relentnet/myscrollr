apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-service
  namespace: scrollr
  labels:
    app: finance-service
spec:
  replicas: 1
  progressDeadlineSeconds: 1500
  selector:
    matchLabels:
      app: finance-service
  template:
    metadata:
      labels:
        app: finance-service
    spec:
      containers:
        - name: finance-service
          image: registry.digitalocean.com/scrollr/finance-service:latest
          ports:
            - containerPort: 3001
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: scrollr-secrets
                  key: DATABASE_URL
            - name: TWELVEDATA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: scrollr-secrets
                  key: TWELVEDATA_API_KEY
            - name: PORT
              value: "3001"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          # Startup: wait for DB init + first WebSocket connect. 5 min
          # runway is enough even when TwelveData is slow to respond.
          startupProbe:
            httpGet:
              path: /health/ready
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 60
            timeoutSeconds: 3
          # Liveness: process-alive only. WebSocket reconnects are a
          # runtime concern handled by the reconnect loop, not a reason
          # to SIGTERM.
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 6
            timeoutSeconds: 3
          # Readiness: 503 when staleness threshold (10 min) is exceeded
          # with no batches processed. Pod drops out of the ready pool
          # without restarting.
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
---
apiVersion: v1
kind: Service
metadata:
  name: finance-service
  namespace: scrollr
spec:
  selector:
    app: finance-service
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
