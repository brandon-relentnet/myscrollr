apiVersion: apps/v1
kind: Deployment
metadata:
  name: rss-service
  namespace: scrollr
  labels:
    app: rss-service
spec:
  replicas: 1
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app: rss-service
  template:
    metadata:
      labels:
        app: rss-service
    spec:
      containers:
        - name: rss-service
          image: registry.digitalocean.com/scrollr/rss-service:latest
          ports:
            - containerPort: 3004
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: scrollr-secrets
                  key: DATABASE_URL
            - name: PORT
              value: "3004"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rss-service
  namespace: scrollr
spec:
  selector:
    app: rss-service
  ports:
    - port: 3004
      targetPort: 3004
  type: ClusterIP
