apiVersion: apps/v1
kind: Deployment
metadata:
  name: rss-service
  namespace: scrollr
  labels:
    app: rss-service
spec:
  replicas: 1
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app: rss-service
  template:
    metadata:
      labels:
        app: rss-service
    spec:
      containers:
        - name: rss-service
          image: registry.digitalocean.com/scrollr/rss-service:latest
          ports:
            - containerPort: 3004
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: scrollr-secrets
                  key: DATABASE_URL
            - name: PORT
              value: "3004"
            # Sentry — per-service DSN inlined (ingestion-only, not a leak).
            - name: SENTRY_DSN
              value: "https://62cf3908dc4be27fb6e14f04fb77d035@o4511384091033600.ingest.us.sentry.io/4511384416550912"
            - name: ENVIRONMENT
              valueFrom:
                secretKeyRef:
                  name: scrollr-secrets
                  key: ENVIRONMENT
                  optional: true
            - name: GIT_SHA
              valueFrom:
                secretKeyRef:
                  name: scrollr-secrets
                  key: GIT_SHA
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          # Startup: first RSS poll cycle ingests 100+ feeds in parallel
          # (~30-60s typically). 5 min runway is plenty.
          startupProbe:
            httpGet:
              path: /health/ready
              port: 3004
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 60
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3004
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 6
            timeoutSeconds: 3
          # Readiness: 503 when the 5-minute ingest interval has been
          # exceeded by 2x (10 min). Pod drops out of the ready pool
          # without restarting.
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3004
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
---
apiVersion: v1
kind: Service
metadata:
  name: rss-service
  namespace: scrollr
spec:
  selector:
    app: rss-service
  ports:
    - port: 3004
      targetPort: 3004
  type: ClusterIP
