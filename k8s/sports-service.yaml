apiVersion: apps/v1
kind: Deployment
metadata:
  name: sports-service
  namespace: scrollr
  labels:
    app: sports-service
spec:
  replicas: 1
  progressDeadlineSeconds: 900
  selector:
    matchLabels:
      app: sports-service
  template:
    metadata:
      labels:
        app: sports-service
    spec:
      containers:
        - name: sports-service
          image: registry.digitalocean.com/scrollr/sports-service:latest
          ports:
            - containerPort: 3002
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: scrollr-secrets
                  key: DATABASE_URL
            - name: API_SPORTS_KEY
              valueFrom:
                secretKeyRef:
                  name: scrollr-secrets
                  key: API_SPORTS_KEY
            - name: PORT
              value: "3002"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          # Startup probe: wait until ingestion has completed its first
          # successful poll. `failureThreshold: 60` * `periodSeconds: 5`
          # = 5 minutes of runway — generous for the adaptive live poll
          # and the 30-minute schedule poll's first iteration. If the
          # pod isn't ready in 5 minutes, something is genuinely broken
          # (bad migration, unreachable upstream, missing env var) and
          # k8s should kill it and try again.
          startupProbe:
            httpGet:
              path: /health/ready
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 60
            timeoutSeconds: 3
          # Liveness probe targets /health/live (process alive only).
          # A transient DB hiccup should NOT trigger a pod kill — that
          # would mask the root cause. Use `failureThreshold: 6` so a
          # brief stall doesn't restart the pod.
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 6
            timeoutSeconds: 3
          # Readiness probe targets /health/ready. Returns 503 when the
          # service is starting, failed, or its last poll is older than
          # 2x the widest expected interval. k8s stops routing traffic
          # to a NotReady pod without restarting it — the right
          # behavior for "ingestion stuck, service process fine".
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          # preStop gives in-flight requests a grace period to complete
          # before SIGTERM takes the process down.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
---
apiVersion: v1
kind: Service
metadata:
  name: sports-service
  namespace: scrollr
spec:
  selector:
    app: sports-service
  ports:
    - port: 3002
      targetPort: 3002
  type: ClusterIP
